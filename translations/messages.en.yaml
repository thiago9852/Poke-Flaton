"Sobre os Dados": "About the Data"
"Todas as informações exibidas no site incluindo nomes, tipos, status, habilidades, movimentos e imagens dos Pokémon são integradas de forma dinâmica e automatizada utilizando a <strong>PokeAPI</strong>, a API de dados pública mais robusta sobre o universo Pokémon. Dessa forma, garantimos dados confiáveis e sempre sincronizados com os jogos da franquia.": "All information displayed on the site including names, types, stats, abilities, moves and images of Pokémon is dynamically and automatically integrated using <strong>PokeAPI</strong>, the most robust public data API about the Pokémon universe. Thus, we ensure reliable data always synchronized with the franchise's games."

