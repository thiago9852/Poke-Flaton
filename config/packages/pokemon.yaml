parameters:
    # Gerações habilitadas no site. Atualmente apenas a Geração 1 está ativa.
    # Ex: [1] para apenas Geração 1, ou [1, 2] para Geração 1 e 2.
    app.pokemon.allowed_generations: [1, 2, 3, 4, 5, 6]

    # IDs individuais permitidos de gerações não totalmente ativadas.
    # Ex: [722] se quisermos permitir apenas o Decidueye de Gen 7 no site.
    app.pokemon.allowed_extra_ids: []

    # IDs excluídos de serem exibidos ou acessados (Lendários e Míticos das Gerações 1 a 6 e suas Megas)
    app.pokemon.excluded_ids: [
        144, 145, 146, 150, 151, 10043, 10044, # Gen 1
        243, 244, 245, 249, 250, 251,           # Gen 2
        377, 378, 379, 380, 381, 382, 383, 384, 385, 386, 10080, 10081, 10085, # Gen 3 & Megas
